<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#124740" />
    <title>SENTINELLE hors ligne</title>
    <style>
      :root {
        color-scheme: dark;
        background: #111722;
        color: #eef2f7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 560px;
        border: 1px solid rgb(255 255 255 / 12%);
        border-radius: 8px;
        background: #182131;
        padding: 28px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p {
        margin: 14px 0 0;
        color: #cbd5e1;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        margin-top: 22px;
        border-radius: 8px;
        background: #124740;
        color: white;
        font-weight: 700;
        padding: 10px 14px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SENTINELLE est hors ligne</h1>
      <p>La connexion au serveur est indisponible. Les ressources déjà mises en cache restent accessibles, et les actions terrain prévues pour le mode hors ligne seront synchronisées au retour réseau.</p>
      <a href="/">Réessayer</a>
    </main>
  </body>
</html>
