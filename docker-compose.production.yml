services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelle-app
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://sentinelle:${POSTGRES_PASSWORD:-changez-ce-mot-de-passe}@postgres:5432/sentinelle?schema=public
      FILE_STORAGE_PATH: /app/storage
      LOCAL_DATASTORE_DISABLED: "true"
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - sentinelle-files:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: sentinelle-postgres-prod
    environment:
      POSTGRES_USER: sentinelle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changez-ce-mot-de-passe}
      POSTGRES_DB: sentinelle
    volumes:
      - sentinelle-postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelle -d sentinelle"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sentinelle-files:
  sentinelle-postgres-prod-data:
