services:
  - type: web
    name: sentinelle-preprod
    runtime: docker
    plan: starter
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /login
    autoDeployTrigger: commit
    preDeployCommand: npx prisma migrate deploy
    initialDeployHook: npx prisma db seed
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentinelle-postgres
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: APP_URL
        value: https://sentinelle-preprod.onrender.com
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: "false"
      - key: LOCAL_DATASTORE_DISABLED
        value: "true"
      - key: LOCAL_DATASTORE_ENABLED
        value: "false"
      - key: FILE_STORAGE_DRIVER
        value: filesystem
      - key: FILE_STORAGE_PATH
        value: /app/storage
      - key: AI_FEATURES_ENABLED
        value: "false"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
    disk:
      name: sentinelle-files
      mountPath: /app/storage
      sizeGB: 1

databases:
  - name: sentinelle-postgres
    plan: free
    region: frankfurt
    databaseName: sentinelle
    user: sentinelle
    postgresMajorVersion: "16"
