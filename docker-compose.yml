services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinelle-postgres
    environment:
      POSTGRES_USER: sentinelle
      POSTGRES_PASSWORD: sentinelle
      POSTGRES_DB: sentinelle
    ports:
      - "5432:5432"
    volumes:
      - sentinelle-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelle -d sentinelle"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sentinelle-postgres-data:
